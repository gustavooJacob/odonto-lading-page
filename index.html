<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f766e" />
    <meta
      name="description"
      content="Acesso rápido aos endereços e contatos das clínicas odontológicas."
    />
    <title>Clínica Odontológica | Contatos e Endereços</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="header">
        <div class="logo">LOGO</div>
        <div>
          <p class="eyebrow">Clínica Odontológica</p>
          <h1>Endereços e contatos</h1>
          <p class="subtitle">Escolha a unidade e toque no botão desejado.</p>
        </div>
      </section>

      <section class="grid" aria-label="Unidades da clínica">
        <article class="card">
          <span class="tag">Unidade 01</span>
          <h2>Clínica Central</h2>
          <div class="actions">
            <a class="button button--primary" href="https://www.google.com/maps/search/?api=1&query=Rua+Exemplo+123+Centro" target="_blank" rel="noopener noreferrer">
              Endereço
            </a>
            <a class="button" href="https://wa.me/5500000000000" target="_blank" rel="noopener noreferrer">
              Contato
            </a>
          </div>
        </article>

        <article class="card">
          <span class="tag">Unidade 02</span>
          <h2>Clínica Norte</h2>
          <div class="actions">
            <a class="button button--primary" href="https://www.google.com/maps/search/?api=1&query=Avenida+Exemplo+456+Bairro+Norte" target="_blank" rel="noopener noreferrer">
              Endereço
            </a>
            <a class="button" href="https://wa.me/5500000000000" target="_blank" rel="noopener noreferrer">
              Contato
            </a>
          </div>
        </article>

        <article class="card">
          <span class="tag">Unidade 03</span>
          <h2>Clínica Sul</h2>
          <div class="actions">
            <a class="button button--primary" href="https://www.google.com/maps/search/?api=1&query=Praca+Exemplo+789+Bairro+Sul" target="_blank" rel="noopener noreferrer">
              Endereço
            </a>
            <a class="button" href="https://wa.me/5500000000000" target="_blank" rel="noopener noreferrer">
              Contato
            </a>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
